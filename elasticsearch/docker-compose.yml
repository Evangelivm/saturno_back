# ─────────────────────────────────────────────────────────────────────────────
# Saturno – Elasticsearch stack
#
# Servicios:
#   • elasticsearch  → motor de búsqueda  (puerto 9200)
#   • kibana         → panel de gestión   (puerto 5601)
#   • setup          → inicializa contraseñas en el primer arranque
#
# Uso rápido:
#   cp .env.example .env          # copiar y editar credenciales
#   docker compose up -d          # levantar
#   docker compose down -v        # detener y borrar volúmenes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. Setup (se ejecuta una sola vez y termina) ────────────────────────────
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: saturno-es-setup
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    user: "0"
    networks:
      - saturno_network
    command: >
      bash -c '
        if [ -z "${ELASTIC_PASSWORD}" ] || [ -z "${KIBANA_PASSWORD}" ]; then
          echo "ERROR: define ELASTIC_PASSWORD y KIBANA_PASSWORD en el .env";
          exit 1;
        fi;

        if [ ! -f config/certs/ca.zip ]; then
          echo "Generando CA...";
          bin/elasticsearch-certutil ca --silent --pem -out config/certs/ca.zip;
          unzip -o config/certs/ca.zip -d config/certs;
        fi;

        if [ ! -f config/certs/certs.zip ]; then
          echo "Generando certificados del nodo...";
          echo -e "instances:\n  - name: elasticsearch\n    dns:\n      - elasticsearch\n      - localhost\n    ip:\n      - 127.0.0.1\n" > config/certs/instances.yml;
          bin/elasticsearch-certutil cert --silent --pem -out config/certs/certs.zip \
            --in config/certs/instances.yml --ca-cert config/certs/ca/ca.crt --ca-key config/certs/ca/ca.key;
          unzip -o config/certs/certs.zip -d config/certs;
        fi;

        echo "Ajustando permisos...";
        chown -R root:root config/certs;
        chmod -R 755 config/certs;
        chmod 640 config/certs/ca/ca.crt config/certs/elasticsearch/elasticsearch.crt config/certs/elasticsearch/elasticsearch.key;

        echo "Setup completado.";
      '
    healthcheck:
      test: ["CMD-SHELL", "[ -f /usr/share/elasticsearch/config/certs/elasticsearch/elasticsearch.crt ]"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ── 2. Elasticsearch ────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: saturno-elasticsearch
    depends_on:
      setup:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - saturno_network
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - esdata:/usr/share/elasticsearch/data
    environment:
      - node.name=saturno-es01
      - cluster.name=${CLUSTER_NAME:-saturno-cluster}
      - discovery.type=single-node

      # Seguridad (TLS + contraseña)
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/elasticsearch/elasticsearch.key
      - xpack.security.http.ssl.certificate=certs/elasticsearch/elasticsearch.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/elasticsearch/elasticsearch.key
      - xpack.security.transport.ssl.certificate=certs/elasticsearch/elasticsearch.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate

      # Memoria JVM  →  nunca superar el 50 % de la RAM disponible
      - "ES_JAVA_OPTS=-Xms${ES_HEAP_SIZE:-2g} -Xmx${ES_HEAP_SIZE:-2g}"
      - bootstrap.memory_lock=true

      # Licencia community (gratuita); cambiar a "trial" para probar features platinum
      - xpack.license.self_generated.type=${ES_LICENSE:-basic}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --cacert config/certs/ca/ca.crt -u elastic:${ELASTIC_PASSWORD} https://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ── 3. Kibana ───────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    container_name: saturno-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - saturno_network
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    volumes:
      - certs:/usr/share/kibana/config/certs
      - kibanadata:/usr/share/kibana/data
    environment:
      - SERVERNAME=kibana
      - ELASTICSEARCH_HOSTS=https://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=config/certs/ca/ca.crt
      - XPACK_SECURITY_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'"
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ── 4. Inicializar contraseña de kibana_system ──────────────────────────────
  #    Se ejecuta una sola vez después de que ES esté sano.
  kibana-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: saturno-kibana-setup
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - saturno_network
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    restart: "no"
    command: >
      bash -c '
        echo "Esperando a Elasticsearch...";
        until curl -s --cacert config/certs/ca/ca.crt \
          -u elastic:${ELASTIC_PASSWORD} https://elasticsearch:9200 | grep -q "cluster_name"; do
          sleep 5;
        done;
        echo "Estableciendo contraseña de kibana_system...";
        curl -s -X POST --cacert config/certs/ca/ca.crt \
          -u "elastic:${ELASTIC_PASSWORD}" \
          -H "Content-Type: application/json" \
          https://elasticsearch:9200/_security/user/kibana_system/_password \
          -d "{\"password\":\"${KIBANA_PASSWORD}\"}";
        echo "";
        echo "Kibana system password configurada.";
      '

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  certs:
    driver: local
  esdata:
    driver: local
  kibanadata:
    driver: local

networks:
  saturno_network:
    external: true
